<!DOCTYPE html>
<html>

<head>
    <title>Student Details</title>
</head>

<body>
    <h1>Student Info</h1>
    <p id="data"></p>

    <script>
        fetch("/api/student-details")
            .then(res => res.json())
            .then(data => {
                document.getElementById("data").innerText =
                    data.name + " | " + data.roll
            })
    </script>
</body>

</html>
